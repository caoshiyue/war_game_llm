task: "fast_observe_red"
max_workers: 8
N: 6
request_interval: 5.0 # 请求间隔（秒）
output_base: "./search_psy/section1"
data_dir: "./data/section3"
api_params:
  max_tokens: 8000
  temperature: 0.7
  top_p: 0.9
data_processing:
  file_configs:
    - name: "contentA"  
      path: "sides_data.0.chunk_analysis_results.0.llm_analysis"
    - name: "contentB"
      path: "sides_data.0.chunk_analysis_results.0.llm_analysis"
  extract_fields:
    - name: "action_A"             # 新增字段
      pattern: "<action_A>\\[?(.*?)\\]?</action_A>"
      required: false         # 不允许匹配失败
    - name: "step_A"             # 新增字段
      pattern: "<step_A>\\[?(.*?)\\]?</step_A>"
      required: false         # 不允许匹配失败
    - name: "action_B"             # 新增字段
      pattern: "<action_B>\\[?(.*?)\\]?</action_B>"
      required: false         # 不允许匹配失败
    - name: "step_B"             # 新增字段
      pattern: "<step_B>\\[?(.*?)\\]?</step_B>"
      required: false         # 不允许匹配失败
analysis:
  
system_prompt: "你是一个军事策略分析专家，下面是陆战兵棋夺控战（以争夺关键地域或目标为核心任务的战术推演想定）中的两个玩家的战术复盘，包括玩家方单位的所有行动。"
user_prompt_template: |
  对局A:
  {prompt[contentA]}

  对局B:
  {prompt[contentB]}

  首先，分别分析复盘中玩家对哪些单位采取了哪些行动。
  其次，请在这两局复盘中各寻找一个片段（明确时间步），都处于对局前期（600步之前），但两个玩家的结果完全不同：其中一个玩家在更短的时间步内就观察到了敌方地面单位（坦克和战车），另一个玩家花费了更长的时间才观察到了敌方地面单位（坦克和战车）。如果双方的片段区分不明显或者不符合，直接回答++E++结束。
  如果找到了符合的片段，请给出分析过程，分析完成后，以"<action_A>[此处填充对局A的片段描述]</action_A> <step_A>[此处填充片段开始时间步-结束时间步]</step_A>; <action_B>[此处填充对局B片段描述]</action_B> <step_B>[此处填充片段开始时间步-结束时间步]</step_B>" 的格式复述该片段中的玩家行动(不要自行总结)，在回答最后用++A++或++B++说明对局A片段还是对局B片段的玩家在更短的时间步内就观察到了敌方地面单位（坦克和战车）。
