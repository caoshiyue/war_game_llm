task: "QA_test_red"
model: "gpt-4o"
max_workers: 16
request_interval: 5.0 # 请求间隔（秒）
output_base: "./search_psy/results_v3_based"
data_dir: "./data/results_overall_deepseek_v3"
N: 10
api_params:
  max_tokens: 8000
  temperature: 0.7
  top_p: 0.9
data_processing:
  file_configs:
    - name: "contentA"  
      path: ""
    - name: "contentB"
      path: ""
    - name: "contentC"  
      path: ""
    - name: "contentD"
      path: ""
  extract_fields:
analysis:
  min_consensus: 2
  output_dir: "analysis_results/"  # 自定义输出目录
system_prompt: "你是一个军事策略分析专家，下面是陆战兵棋夺控战（以争夺关键地域或目标为核心任务的战术推演想定）中的两个玩家的战术复盘，包括玩家方单位的所有行动。"
user_prompt_template: |
  对局A:
  {prompt[contentA][analyze_0][chunks_results][0][content]}

  对局B:
  {prompt[contentA][analyze_1][chunks_results][0][content]}

  对局C:
  {prompt[contentA][analyze_1][overall_result][0][content]}

  对局D:
  {prompt[contentA][analyze_0][overall_result][0][content]}

  首先，分别分析复盘中玩家对哪些单位采取了哪些行动。
  其次，回答哪一个对局中玩家的采取的策略风险最高，在回答的最后以++A++,++B++,++C++,++D++的形式作为答案，若无法判断则回答++E++。
  
